<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Notepad</title>
  <link rel="icon" href="assets/fav-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <!-- Header with tabs and buttons -->
  <header>
    <div id="authContainer">
      <!-- Auth buttons -->
      <div id="authButtons">
        <button onclick="openModal('loginPopup')">Login</button>
        <button onclick="openModal('signupPopup')">Signup</button>
      </div>


      <!-- Logout (hidden until logged in) -->
      <div id="logoutSection" style="display:none;">
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="tabs"></div>

    <div class="actions">
      <a href="readonly.html" class="link" title="Read Only">
        <i class="fa fa-eye" aria-hidden="true"></i>
      </a>
      <a href="about.html" class="link" title="About">
        <i class="fa fa-info" aria-hidden="true"></i>
      </a>
      <a href="settings.html" class="link" title="Settings">
        <i class="fa fa-cog" aria-hidden="true"></i>
      </a>
      <button id="gameBtn" title="Play Snake Game">🎮</button>
      <button id="darkToggle">🌙</button>
      <button id="downloadBtn">⬇️ Download</button>
    </div>

    <button class="hamburger" onclick="toggleMenu()">☰</button>
    <!-- Side Panel (Mobile Drawer) -->
    <!-- Replace the existing side panel with this improved version -->
    <div id="sidePanel" class="side-panel">
      <div class="side-panel-content">
        <button id="closePanelBtn" class="close-panel">✖</button>
        <button id="newNoteBtn" class="tab-new">+ New Note</button>
        <h3 class="panel-title">Your Documents</h3>
        <ul id="mobileDocList" class="doc-list"></ul>

        <!-- Move/copy existing buttons here dynamically -->
        <div id="sidePanelButtons"></div>
      </div>

      <!-- Bottom actions section -->
      <div class="side-panel-bottom-actions">
        <div class="bottom-actions-container">
          <button id="gameBtnMobile">🎮</button>
          <button id="darkToggleMobile">🌙</button>
          <button id="downloadBtnMobile">⬇️ Download</button>
          <button id="logoutBtnMobile">Logout</button>
        </div>
      </div>
    </div>

  </header>

  <!-- Format Toggle Button -->
  <button id="formatToggle" class="format-toggle-btn" title="Show/Hide Formatting Options">
    <i class="fas fa-magic"></i>
    <span class="format-toggle-text">Format</span>
  </button>

  <!-- Toolbar -->
  <main class="main-content">
    <!-- Desktop Toolbar -->
    <div id="desktopToolbar" class="desktop-toolbar">
      <button onclick="formatText('bold')" class="toolbar-btn" title="Bold"><b>B</b></button>
      <button onclick="formatText('italic')" class="toolbar-btn" title="Italic"><i>I</i></button>
      <button onclick="formatText('underline')" class="toolbar-btn" title="Underline"><u>U</u></button>
      <button onclick="formatText('strikeThrough')" class="toolbar-btn" title="Strikethrough"><s>S</s></button>
      <button onclick="formatText('formatBlock', 'blockquote')" class="toolbar-btn" title="Quote">"</button>
      <button onclick="formatText('formatBlock', 'pre')" class="toolbar-btn" title="Code">{;}</button>
      <button onclick="formatText('insertOrderedList')" class="toolbar-btn" title="Numbered List">1.</button>
      <button onclick="formatText('insertUnorderedList')" class="toolbar-btn" title="Bullet List">•</button>
      <button onclick="formatText('formatBlock', 'h1')" class="toolbar-btn" title="Heading 1">H1</button>
      <button onclick="formatText('formatBlock', 'h2')" class="toolbar-btn" title="Heading 2">H2</button>
      <button onclick="decreaseFontSize()" class="toolbar-btn" title="Decrease Font">A-</button>
      <button onclick="increaseFontSize()" class="toolbar-btn" title="Increase Font">A+</button>
      <input id="fontColorPicker" class="color-picker-input" type="color" onchange="setFontColor(this.value)" />
      <label for="fontColorPicker" class="toolbar-btn color-picker-btn" title="Text Color">
        <i class="fas fa-palette"></i>
        <span id="colorSwatch" class="color-swatch"></span>
      </label>
      <button onclick="window.toolbar.showCustomShortcutDialog()" class="toolbar-btn" title="Shortcuts">⚡</button>
      <button onclick="clearFormatting()" class="toolbar-btn" title="Clear Format">Clear</button>
    </div>

    <!-- Mobile Floating Toolbar -->
    <div id="mobileToolbar" class="mobile-toolbar hidden">
      <!-- Quick Actions Row -->
      <div class="mobile-toolbar-row">
        <button onclick="formatText('bold')" class="mobile-btn" title="Bold">
          <i class="fas fa-bold"></i>
        </button>
        <button onclick="formatText('italic')" class="mobile-btn" title="Italic">
          <i class="fas fa-italic"></i>
        </button>
        <button onclick="formatText('underline')" class="mobile-btn" title="Underline">
          <i class="fas fa-underline"></i>
        </button>
        <button onclick="formatText('insertUnorderedList')" class="mobile-btn" title="List">
          <i class="fas fa-list-ul"></i>
        </button>
        <button id="moreBtn" class="mobile-btn more-btn" title="More Options">
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </div>
    </div>

    <!-- Mobile More Options Popup -->
    <div id="mobileMorePopup" class="mobile-more-popup">
      <div class="more-popup-content">
        <div class="more-section">
          <h4>Formatting</h4>
          <div class="more-buttons">
            <button onclick="formatText('strikeThrough')" class="more-btn">
              <i class="fas fa-strikethrough"></i>
              <span>Strike</span>
            </button>
            <button onclick="formatText('formatBlock', 'h1')" class="more-btn">
              <span class="btn-text">H1</span>
            </button>
            <button onclick="formatText('formatBlock', 'h2')" class="more-btn">
              <span class="btn-text">H2</span>
            </button>
            <button onclick="formatText('formatBlock', 'blockquote')" class="more-btn">
              <i class="fas fa-quote-left"></i>
              <span>Quote</span>
            </button>
          </div>
        </div>
        
        <div class="more-section">
          <h4>Lists & Code</h4>
          <div class="more-buttons">
            <button onclick="formatText('insertOrderedList')" class="more-btn">
              <i class="fas fa-list-ol"></i>
              <span>Numbered</span>
            </button>
            <button onclick="formatText('formatBlock', 'pre')" class="more-btn">
              <i class="fas fa-code"></i>
              <span>Code</span>
            </button>
          </div>
        </div>
        
        <div class="more-section">
          <h4>Font & Style</h4>
          <div class="more-buttons">
            <button onclick="decreaseFontSize()" class="more-btn">
              <i class="fas fa-minus"></i>
              <span>A-</span>
            </button>
            <button onclick="increaseFontSize()" class="more-btn">
              <i class="fas fa-plus"></i>
              <span>A+</span>
            </button>
            <input id="mobileColorPicker" class="color-picker-input" type="color" onchange="setFontColor(this.value)" />
            <label for="mobileColorPicker" class="more-btn color-picker-btn">
              <i class="fas fa-palette"></i>
              <span>Color</span>
            </label>
          </div>
        </div>
        
        <div class="more-section">
          <h4>Actions</h4>
          <div class="more-buttons">
            <button onclick="window.toolbar.showCustomShortcutDialog()" class="more-btn">
              <i class="fas fa-bolt"></i>
              <span>Shortcuts</span>
            </button>
            <button onclick="clearFormatting()" class="more-btn">
              <i class="fas fa-eraser"></i>
              <span>Clear</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Text editor -->
    <div id="editor" contenteditable="true" class="editor textarea" placeholder="Start typing..."></div>
  </main>

  <!-- Footer -->
  <footer>
    <span id="status">Words: 0 | Chars: 0</span>
    <div class="mt-2 md:mt-0">Made with ❤️ by Avnish</div>
  </footer>

  <!-- Login Modal -->
  <div id="loginPopup" class="modal">
    <div class="modal-content auth-box">
      <span class="popup-close-btn" onclick="closeModal('loginPopup')">&times;</span>
      <h2 class="auth-title">Welcome Back 👋</h2>

      <input type="email" id="loginEmail" placeholder="Email" class="auth-input" />
      <input type="password" id="loginPassword" placeholder="Password" class="auth-input" />

      <button class="auth-btn" onclick="login()">Login</button>

      <div class="auth-divider"><span>or</span></div>

      <button class="google-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
    </div>
  </div>


  <!-- Signup Modal -->
  <div id="signupPopup" class="modal">
    <div class="modal-content auth-box">
      <span class="popup-close-btn" onclick="closeModal('signupPopup')">&times;</span>
      <h2 class="auth-title">Create an Account</h2>
      <input id="signupEmail" type="email" placeholder="Email" class="auth-input" />
      <input id="signupPassword" type="password" placeholder="Password" class="auth-input" />
      <button class="auth-btn" onclick="signup()">Signup</button>
    </div>
  </div>

  <!-- Core app logic -->
  <script type="module" src="js/app/main.js"></script>

  <!-- Reusable confirm dialog is created dynamically in js/app.js -->

  <!-- Fallback: ensure global formatting functions exist for inline toolbar buttons -->
  <script>
    window.formatText = window.formatText || function (command, value) {
      try { document.execCommand(command, false, value || null); } catch (e) { }
      var ed = document.getElementById('editor');
      if (ed) ed.focus();
    };
    window.clearFormatting = window.clearFormatting || function () {
      try { document.execCommand('removeFormat', false, null); } catch (e) { }
      var ed = document.getElementById('editor');
      if (ed) ed.focus();
    };
  </script>

  <!-- Inline modal/side-panel logic moved to js/app.js -->
</body>

</html>
