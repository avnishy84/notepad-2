<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - One Notepad</title>
  <link rel="icon" href="assets/fav-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark-init');</script>
  <style>
    /* Settings page layout */
    .settings-page-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--bg);
      backdrop-filter: var(--bg-blur);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .settings-main {
      padding-top: 56px;
      padding-bottom: 60px;
      min-height: 100vh;
    }

    .settings-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .settings-container h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 28px;
      color: var(--text);
    }

    .settings-section {
      background: var(--bg);
      border: 1px solid rgba(74,144,226,0.12);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .settings-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(74,144,226,0.07);
    }

    .setting-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .setting-item label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .setting-item span {
      font-size: 13px;
      color: var(--muted);
    }

    .setting-item select {
      padding: 6px 10px;
      border: 1px solid rgba(74,144,226,0.2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .setting-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .btn-secondary {
      background: rgba(74,144,226,0.12);
      color: var(--accent);
      border: 1px solid rgba(74,144,226,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-secondary:hover {
      background: rgba(74,144,226,0.22);
    }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-danger:hover {
      background: rgba(239,68,68,0.2);
    }

    .settings-footer {
      text-align: center;
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>
  <!-- Header — hamburger only, left-aligned -->
  <header class="settings-page-header">
    <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">☰</button>
  </header>

  <!-- Side Panel -->
  <div id="sidePanelOverlay" class="side-panel-overlay"></div>
  <div id="sidePanel" class="side-panel">
    <div class="side-panel-content">
      <button id="closePanelBtn" class="close-panel">✖</button>

      <div id="sidePanelAuth" class="panel-section">
        <div id="sidePanelLoggedOut">
          <button id="sidePanelLoginBtn">Login</button>
          <button id="sidePanelSignupBtn">Signup</button>
        </div>
        <div id="sidePanelLoggedIn" style="display:none;">
          <span id="sidePanelEmail" class="panel-email"></span>
          <button id="sidePanelLogoutBtn">Logout</button>
        </div>
      </div>

      <div class="panel-section">
        <span class="panel-section-label">Navigation</span>
        <nav class="panel-nav">
          <a href="index.html" class="panel-nav-link">← Back to Editor</a>
          <a href="about.html" class="panel-nav-link">About</a>
        </nav>
      </div>

      <div class="panel-section">
        <span class="panel-section-label">Actions</span>
        <div class="panel-actions">
          <button id="darkTogglePanel">🌙 Dark Mode</button>
        </div>
      </div>
    </div>
  </div>

  <main class="settings-main">
    <div class="settings-container">
      <h1>Settings</h1>

      <div class="settings-section">
        <h2>Editor</h2>
        <div class="setting-item">
          <label for="defaultFontSize">Default Font Size</label>
          <select id="defaultFontSize">
            <option value="12">12px</option>
            <option value="14">14px</option>
            <option value="16" selected>16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="autoSave">Auto Save</label>
          <input type="checkbox" id="autoSave" checked />
        </div>
        <div class="setting-item">
          <label for="spellCheck">Spell Check</label>
          <input type="checkbox" id="spellCheck" />
        </div>
      </div>

      <div class="settings-section">
        <h2>Appearance</h2>
        <div class="setting-item">
          <label for="theme">Theme</label>
          <select id="theme">
            <option value="auto">Auto (System)</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="fontFamily">Font Family</label>
          <select id="fontFamily">
            <option value="Inter" selected>Inter</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h2>Account</h2>
        <div class="setting-item">
          <label>Email</label>
          <span id="userEmail">Not logged in</span>
        </div>
        <div class="setting-item">
          <label>Export</label>
          <button id="exportData" class="btn-secondary">Export All Data</button>
        </div>
        <div class="setting-item">
          <label>Danger Zone</label>
          <button id="deleteAccount" class="btn-danger">Delete Account</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="settings-footer">Made with ❤️ by Avnish</footer>

  <!-- Login Modal -->
  <div id="loginPopup" class="modal">
    <div class="modal-content auth-box">
      <span class="popup-close-btn" onclick="closeModal('loginPopup')">&times;</span>
      <h2 class="auth-title">Welcome Back 👋</h2>
      <input type="email" id="loginEmail" placeholder="Email" class="auth-input" />
      <input type="password" id="loginPassword" placeholder="Password" class="auth-input" />
      <button class="auth-btn" onclick="login()">Login</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="google-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
    </div>
  </div>

  <!-- Signup Modal -->
  <div id="signupPopup" class="modal">
    <div class="modal-content auth-box">
      <span class="popup-close-btn" onclick="closeModal('signupPopup')">&times;</span>
      <h2 class="auth-title">Create an Account</h2>
      <input id="signupEmail" type="email" placeholder="Email" class="auth-input" />
      <input id="signupPassword" type="password" placeholder="Password" class="auth-input" />
      <button class="auth-btn" onclick="signup()">Signup</button>
    </div>
  </div>

  <script type="module" src="js/app/main.js"></script>
</body>

</html>
